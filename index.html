<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperCycle - E-Waste Recycling App</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX (Pinned stable version to prevent import error) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        hyper: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#0f4c47', // Deep forest teal from presentation
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth tab transitions */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Explicitly defining presets fixes browser environment parsing -->
    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect } = React;

        // --- MOCK DATA ---
        const INITIAL_PICKUPS = [
            { id: 'HC-9821', item: 'Dell Inspiron Laptop', status: 'Completed', date: 'Oct 12, 2023', points: 450, icon: 'fa-laptop' },
            { id: 'HC-9942', item: 'Assorted Cables & Chargers', status: 'Processing', date: 'Oct 24, 2023', points: 0, icon: 'fa-plug' }
        ];

        const REWARD_VOUCHERS = [
            { id: 1, brand: 'Amazon', value: '₹500', points: 2000, color: 'bg-yellow-100 text-yellow-800' },
            { id: 2, brand: 'Uber', value: '₹200', points: 800, color: 'bg-black text-white' },
            { id: 3, brand: 'Swiggy', value: '₹150', points: 600, color: 'bg-orange-100 text-orange-800' },
        ];

        const LOCATIONS = [
            { id: 1, name: 'RVCE Campus Smart Bin', address: 'Chemical Eng. Block', dist: '0.2 km', type: 'Bin' },
            { id: 2, name: 'RR Nagar E-Waste Hub', address: 'Ideal Homes Township', dist: '1.5 km', type: 'Hub' },
            { id: 3, name: 'Kengeri Processing Unit', address: 'Kengeri Satellite Town', dist: '3.2 km', type: 'Facility' },
        ];

        // --- COMPONENTS ---
        
        // Custom Header for screens
        const ScreenHeader = ({ title, subtitle }) => (
            <div className="bg-white px-6 pt-12 pb-4 shadow-sm z-10 relative">
                <h1 className="text-2xl font-heading font-bold text-hyper-900">{title}</h1>
                {subtitle && <p className="text-sm text-gray-500 mt-1">{subtitle}</p>}
            </div>
        );

        // 1. HOME SCREEN
        const HomeContent = ({ setTab }) => (
            <div className="p-6 pb-24 h-full overflow-y-auto hide-scrollbar fade-enter-active">
                {/* Header Profile */}
                <div className="flex justify-between items-center mb-8 pt-6">
                    <div>
                        <p className="text-sm text-gray-500 mb-1">Good Morning,</p>
                        <h1 className="text-2xl font-heading font-bold text-hyper-900">Alex Student</h1>
                    </div>
                    <div className="w-12 h-12 bg-hyper-100 rounded-full flex items-center justify-center border-2 border-hyper-500 shadow-sm">
                        <i className="fa-solid fa-user text-hyper-600 text-xl"></i>
                    </div>
                </div>

                {/* Impact Card */}
                <div className="bg-gradient-to-br from-hyper-900 to-hyper-700 rounded-3xl p-6 text-white mb-8 shadow-lg relative overflow-hidden">
                    <div className="absolute top-0 right-0 opacity-10 text-9xl transform translate-x-4 -translate-y-4">
                        <i className="fa-solid fa-leaf"></i>
                    </div>
                    <p className="text-hyper-100 text-sm font-medium mb-1">Your Impact Balance</p>
                    <h2 className="text-4xl font-heading font-bold mb-4">1,250 <span className="text-lg font-normal">pts</span></h2>
                    
                    <div className="flex gap-4 border-t border-hyper-600 pt-4">
                        <div className="flex-1">
                            <p className="text-xs text-hyper-100 mb-1">CO2 Saved</p>
                            <p className="font-semibold"><i className="fa-solid fa-cloud text-green-300 mr-1"></i> 14.2 kg</p>
                        </div>
                        <div className="flex-1 border-l border-hyper-600 pl-4">
                            <p className="text-xs text-hyper-100 mb-1">Items Recycled</p>
                            <p className="font-semibold"><i className="fa-solid fa-recycle text-blue-300 mr-1"></i> 8 Items</p>
                        </div>
                    </div>
                </div>

                {/* Primary Action Button */}
                <button 
                    onClick={() => setTab('schedule')}
                    className="w-full bg-hyper-500 hover:bg-hyper-600 text-white font-semibold py-4 rounded-2xl shadow-lg shadow-hyper-500/30 flex items-center justify-center gap-3 transition-transform active:scale-95 mb-8"
                >
                    <i className="fa-solid fa-truck-fast text-xl"></i>
                    <span className="text-lg">Schedule Doorstep Pickup</span>
                </button>

                {/* Quick Stats / Info */}
                <h3 className="font-heading font-semibold text-gray-800 mb-4 text-lg">Did you know?</h3>
                <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex items-start gap-4">
                    <div className="bg-blue-50 p-3 rounded-xl text-blue-600">
                        <i className="fa-solid fa-droplet"></i>
                    </div>
                    <div>
                        <p className="text-sm text-gray-600 leading-relaxed">Recycling one smartphone saves enough energy to power a laptop for <strong>44 hours</strong>.</p>
                    </div>
                </div>
            </div>
        );

        // 2. SCHEDULE PICKUP SCREEN
        const ScheduleContent = ({ setTab, addPickup }) => {
            const [step, setStep] = useState(1);
            const [selectedCategory, setSelectedCategory] = useState(null);
            
            const categories = [
                { id: 'laptop', name: 'Laptops & PCs', icon: 'fa-laptop' },
                { id: 'phone', name: 'Smartphones', icon: 'fa-mobile-screen' },
                { id: 'battery', name: 'Batteries', icon: 'fa-car-battery' },
                { id: 'appliance', name: 'Appliances', icon: 'fa-blender' },
                { id: 'cables', name: 'Cables & E-Waste', icon: 'fa-plug' },
                { id: 'other', name: 'Other', icon: 'fa-box' }
            ];

            const handleSchedule = () => {
                // Generate a random ID
                const newId = 'HC-' + Math.floor(1000 + Math.random() * 9000);
                const categoryObj = categories.find(c => c.id === selectedCategory);
                
                addPickup({
                    id: newId,
                    item: categoryObj ? categoryObj.name : 'Electronic Items',
                    status: 'Driver Assigned', // Jump straight to assigned for demo purposes
                    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                    points: 0,
                    icon: categoryObj ? categoryObj.icon : 'fa-box'
                });
                setStep(3); // Go to success
            };

            return (
                <div className="h-full flex flex-col bg-gray-50 fade-enter-active">
                    <ScreenHeader title="Schedule Pickup" subtitle={step === 1 ? "Select item type" : step === 2 ? "Confirm details" : "Success"} />
                    
                    <div className="p-6 flex-1 overflow-y-auto pb-24">
                        {/* Progress Bar */}
                        <div className="flex gap-2 mb-6">
                            <div className={`h-2 flex-1 rounded-full ${step >= 1 ? 'bg-hyper-500' : 'bg-gray-200'}`}></div>
                            <div className={`h-2 flex-1 rounded-full ${step >= 2 ? 'bg-hyper-500' : 'bg-gray-200'}`}></div>
                            <div className={`h-2 flex-1 rounded-full ${step >= 3 ? 'bg-hyper-500' : 'bg-gray-200'}`}></div>
                        </div>

                        {step === 1 && (
                            <div className="fade-enter-active">
                                <div className="grid grid-cols-2 gap-4">
                                    {categories.map(cat => (
                                        <button 
                                            key={cat.id}
                                            onClick={() => setSelectedCategory(cat.id)}
                                            className={`p-4 rounded-2xl border-2 flex flex-col items-center justify-center gap-3 transition-all ${selectedCategory === cat.id ? 'border-hyper-500 bg-hyper-50 text-hyper-700' : 'border-gray-100 bg-white text-gray-500 hover:border-gray-200'}`}
                                        >
                                            <i className={`fa-solid ${cat.icon} text-3xl`}></i>
                                            <span className="font-medium text-sm text-gray-800">{cat.name}</span>
                                        </button>
                                    ))}
                                </div>
                                <button 
                                    disabled={!selectedCategory}
                                    onClick={() => setStep(2)}
                                    className={`w-full mt-8 py-4 rounded-xl font-bold transition-all ${selectedCategory ? 'bg-hyper-900 text-white shadow-lg' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                                >
                                    Continue to Details <i className="fa-solid fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="fade-enter-active">
                                <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm mb-4">
                                    <h3 className="font-medium text-gray-800 mb-4">Pickup Address</h3>
                                    <div className="flex items-start gap-3 text-gray-600">
                                        <i className="fa-solid fa-location-dot mt-1 text-hyper-500"></i>
                                        <p className="text-sm">RV College of Engineering, Boys Hostel Block A, Room 104, Mysuru Road, Bengaluru</p>
                                    </div>
                                    <button className="text-hyper-500 text-sm font-medium mt-3">Change Address</button>
                                </div>

                                <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm mb-6">
                                    <h3 className="font-medium text-gray-800 mb-4">Preferred Time</h3>
                                    <select className="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-xl p-3 outline-none focus:border-hyper-500">
                                        <option>Today, 2:00 PM - 4:00 PM</option>
                                        <option>Tomorrow, 10:00 AM - 12:00 PM</option>
                                    </select>
                                </div>

                                <div className="bg-blue-50 p-4 rounded-xl flex items-start gap-3 mb-6">
                                    <i className="fa-solid fa-shield-halved text-blue-500 mt-0.5"></i>
                                    <p className="text-xs text-blue-800 leading-relaxed">Data wipe guarantee included. Devices will be securely sanitized before recycling.</p>
                                </div>

                                <div className="flex gap-3">
                                    <button onClick={() => setStep(1)} className="px-6 py-4 rounded-xl font-bold bg-gray-100 text-gray-600">Back</button>
                                    <button onClick={handleSchedule} className="flex-1 py-4 rounded-xl font-bold bg-hyper-500 hover:bg-hyper-600 text-white shadow-lg shadow-hyper-500/30">Confirm Booking</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="text-center py-10 fade-enter-active">
                                <div className="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                                    <i className="fa-solid fa-check"></i>
                                </div>
                                <h2 className="text-2xl font-heading font-bold text-gray-800 mb-2">Pickup Scheduled!</h2>
                                <p className="text-gray-500 mb-8 px-4">Our logistics partner will arrive at your location at the designated time.</p>
                                
                                <button 
                                    onClick={() => setTab('track')}
                                    className="w-full py-4 rounded-xl font-bold bg-hyper-900 text-white mb-3"
                                >
                                    Track My Order
                                </button>
                                <button 
                                    onClick={() => {setStep(1); setSelectedCategory(null); setTab('home');}}
                                    className="w-full py-4 rounded-xl font-bold text-hyper-600 bg-hyper-50"
                                >
                                    Back to Home
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 3. TRACKING SCREEN
        const TrackContent = ({ pickups }) => (
            <div className="h-full flex flex-col bg-gray-50 fade-enter-active">
                <ScreenHeader title="Live Tracking" subtitle="Monitor your waste journey" />
                <div className="p-6 flex-1 overflow-y-auto pb-24">
                    {pickups.length === 0 ? (
                        <div className="text-center text-gray-500 mt-10">No active pickups.</div>
                    ) : (
                        pickups.map((pickup, idx) => (
                            <div key={pickup.id} className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm mb-4">
                                <div className="flex justify-between items-start mb-4 border-b border-gray-50 pb-4">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-600">
                                            <i className={`fa-solid ${pickup.icon}`}></i>
                                        </div>
                                        <div>
                                            <h3 className="font-semibold text-gray-800">{pickup.item}</h3>
                                            <p className="text-xs text-gray-400">ID: {pickup.id} • {pickup.date}</p>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Status Timeline */}
                                <div className="relative pl-4 border-l-2 border-gray-100 space-y-6 mt-2 ml-2">
                                    <div className="relative">
                                        <div className="absolute -left-[21px] top-1 w-3 h-3 rounded-full bg-hyper-500 outline outline-4 outline-white"></div>
                                        <p className="text-sm font-semibold text-gray-800">Request Raised</p>
                                        <p className="text-xs text-gray-400">Completed</p>
                                    </div>
                                    <div className="relative">
                                        <div className={`absolute -left-[21px] top-1 w-3 h-3 rounded-full outline outline-4 outline-white ${pickup.status === 'Driver Assigned' || pickup.status === 'Processing' || pickup.status === 'Completed' ? 'bg-hyper-500' : 'bg-gray-200'}`}></div>
                                        <p className={`text-sm font-semibold ${pickup.status === 'Driver Assigned' || pickup.status === 'Processing' || pickup.status === 'Completed' ? 'text-gray-800' : 'text-gray-400'}`}>Driver Assigned</p>
                                        {pickup.status === 'Driver Assigned' && <p className="text-xs text-hyper-500 font-medium mt-1">Rider arriving soon</p>}
                                    </div>
                                    <div className="relative">
                                        <div className={`absolute -left-[21px] top-1 w-3 h-3 rounded-full outline outline-4 outline-white ${pickup.status === 'Completed' ? 'bg-hyper-500' : 'bg-gray-200'}`}></div>
                                        <p className={`text-sm font-semibold ${pickup.status === 'Completed' ? 'text-gray-800' : 'text-gray-400'}`}>Processing / Recycled</p>
                                        {pickup.status === 'Completed' && <p className="text-xs text-green-500 font-medium mt-1">+{pickup.points} Points Rewarded</p>}
                                    </div>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            </div>
        );

        // 4. REWARDS SCREEN
        const RewardsContent = () => (
            <div className="h-full flex flex-col bg-gray-50 fade-enter-active">
                <ScreenHeader title="Rewards" subtitle="Redeem your eco-points" />
                <div className="p-6 flex-1 overflow-y-auto pb-24">
                    {/* Coin Balance */}
                    <div className="bg-hyper-900 rounded-3xl p-6 text-center text-white shadow-xl shadow-hyper-900/20 mb-8">
                        <i className="fa-solid fa-coins text-yellow-400 text-4xl mb-3"></i>
                        <h2 className="text-4xl font-heading font-bold mb-1">1,250</h2>
                        <p className="text-hyper-100 text-sm">Available HyperCoins</p>
                    </div>

                    <h3 className="font-heading font-semibold text-gray-800 mb-4 text-lg">Redeem Vouchers</h3>
                    <div className="space-y-4">
                        {REWARD_VOUCHERS.map(voucher => (
                            <div key={voucher.id} className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-bold text-xl ${voucher.color}`}>
                                        {voucher.brand[0]}
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-gray-800">{voucher.brand}</h4>
                                        <p className="text-sm text-green-600 font-medium">{voucher.value} Gift Card</p>
                                    </div>
                                </div>
                                <button className="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 hover:bg-gray-200">
                                    <i className="fa-solid fa-coins text-yellow-500 text-xs"></i> {voucher.points}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // 5. MAP / DROP-OFF SCREEN
        const MapContent = () => (
            <div className="h-full flex flex-col bg-gray-50 fade-enter-active relative">
                {/* Simulated Map Background */}
                <div className="absolute inset-0 z-0 bg-blue-50 overflow-hidden">
                    <div className="w-[150%] h-[150%] -translate-x-[25%] -translate-y-[25%] opacity-30" style={{backgroundImage: 'radial-gradient(#94a3b8 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                    {/* Fake Map Pins */}
                    <div className="absolute top-[30%] left-[40%] text-hyper-600 text-3xl drop-shadow-md"><i className="fa-solid fa-location-dot"></i></div>
                    <div className="absolute top-[50%] left-[70%] text-hyper-600 text-2xl drop-shadow-md opacity-70"><i className="fa-solid fa-location-dot"></i></div>
                </div>

                <div className="relative z-10 pt-12 px-6 pb-4 bg-gradient-to-b from-white via-white to-transparent">
                    <h1 className="text-2xl font-heading font-bold text-hyper-900 mb-4">Nearby Bins</h1>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 px-4 py-3 flex items-center gap-3">
                        <i className="fa-solid fa-magnifying-glass text-gray-400"></i>
                        <input type="text" placeholder="Search areas..." className="outline-none w-full text-gray-700" />
                    </div>
                </div>

                {/* Bottom Sheet List */}
                <div className="absolute bottom-0 left-0 w-full h-[55%] bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-10 flex flex-col">
                    <div className="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mt-3 mb-4"></div>
                    <div className="flex-1 overflow-y-auto px-6 pb-24">
                        {LOCATIONS.map(loc => (
                            <div key={loc.id} className="border-b border-gray-100 py-4 flex justify-between items-center">
                                <div>
                                    <h4 className="font-semibold text-gray-800">{loc.name}</h4>
                                    <p className="text-xs text-gray-500 mt-1">{loc.address}</p>
                                </div>
                                <div className="text-right">
                                    <span className="bg-hyper-50 text-hyper-700 text-xs px-2 py-1 rounded-md font-medium border border-hyper-100">{loc.dist}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [pickups, setPickups] = useState(INITIAL_PICKUPS);

            const addPickup = (pickup) => {
                setPickups([pickup, ...pickups]);
            };

            const renderContent = () => {
                switch(activeTab) {
                    case 'home': return <HomeContent setTab={setActiveTab} />;
                    case 'schedule': return <ScheduleContent setTab={setActiveTab} addPickup={addPickup} />;
                    case 'track': return <TrackContent pickups={pickups} />;
                    case 'rewards': return <RewardsContent />;
                    case 'map': return <MapContent />;
                    default: return <HomeContent setTab={setActiveTab} />;
                }
            };

            return (
                <div className="flex items-center justify-center min-h-screen bg-[#0f172a] p-4 sm:p-8">
                    {/* Mobile Device Mockup Frame */}
                    <div className="w-full max-w-[400px] h-[800px] max-h-[90vh] bg-white rounded-[2.5rem] shadow-2xl relative overflow-hidden ring-8 ring-gray-900 flex flex-col">
                        
                        {/* Dynamic Viewport */}
                        <div className="flex-1 relative overflow-hidden bg-white">
                            {renderContent()}
                        </div>

                        {/* Bottom Navigation */}
                        <div className="absolute bottom-0 w-full bg-white border-t border-gray-100 px-6 py-4 pb-6 flex justify-between items-center z-50 rounded-b-[2.5rem]">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'home' ? 'text-hyper-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <i className="fa-solid fa-house text-xl"></i>
                                <span className="text-[10px] font-medium">Home</span>
                            </button>
                            <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'map' ? 'text-hyper-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <i className="fa-solid fa-map-location-dot text-xl"></i>
                                <span className="text-[10px] font-medium">Drop-off</span>
                            </button>
                            
                            {/* Prominent Center Action button */}
                            <button onClick={() => setActiveTab('schedule')} className="relative -top-5 w-14 h-14 bg-hyper-500 rounded-full flex flex-col items-center justify-center text-white shadow-lg shadow-hyper-500/40 hover:bg-hyper-600 transition-transform active:scale-95 border-4 border-white">
                                <i className="fa-solid fa-plus text-2xl"></i>
                            </button>

                            <button onClick={() => setActiveTab('track')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'track' ? 'text-hyper-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <i className="fa-solid fa-truck-fast text-xl"></i>
                                <span className="text-[10px] font-medium">Track</span>
                            </button>
                            <button onClick={() => setActiveTab('rewards')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'rewards' ? 'text-hyper-600' : 'text-gray-400 hover:text-gray-600'}`}>
                                <i className="fa-solid fa-gift text-xl"></i>
                                <span className="text-[10px] font-medium">Rewards</span>
                            </button>
                        </div>
                    </div>
                    
                    {/* Explanatory text for desktop view */}
                    <div className="hidden lg:block ml-16 max-w-md text-white">
                        <h2 className="text-3xl font-bold font-heading mb-4 text-hyper-500">HyperCycle Prototype</h2>
                        <p className="text-gray-300 mb-6 leading-relaxed">This interactive simulation demonstrates the core user journey derived from the Design Thinking Lab survey insights.</p>
                        <ul className="space-y-4 text-gray-300">
                            <li className="flex gap-3"><i className="fa-solid fa-check-circle text-hyper-500 mt-1"></i> <strong>Schedule Pickup:</strong> Multi-step form solving the "convenience" barrier.</li>
                            <li className="flex gap-3"><i className="fa-solid fa-check-circle text-hyper-500 mt-1"></i> <strong>Live Tracking:</strong> Ensures transparency and trust.</li>
                            <li className="flex gap-3"><i className="fa-solid fa-check-circle text-hyper-500 mt-1"></i> <strong>Rewards Wallet:</strong> Gamification to encourage repeat recycling behavior.</li>
                        </ul>
                        <div className="mt-8 p-4 bg-gray-800 rounded-xl border border-gray-700">
                            <p className="text-sm italic text-gray-400"><i className="fa-solid fa-lightbulb text-yellow-500 mr-2"></i> Tip: Try scheduling a new pickup using the center '+' button and watch it appear in the 'Track' tab!</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
